<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <base href="/" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <title>Astrophysics Data System</title>
  <meta name="description" content="<%= htmlWebpackPlugin.options.description || 'A powerful, streamlined new Astrophysics Data System' %>" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Favicon -->
  <link rel="icon" href="<%= htmlWebpackPlugin.options.favicon || '/favicon.ico' %>" />

  <!-- OpenSearch -->
  <link rel="search" type="application/opensearchdescription+xml"
        href="https://ui.adsabs.harvard.edu/config/opensearch.xml"
        title="ADS Search" />

  <!-- Web App Metadata -->
  <meta name="apple-mobile-web-app-title" content="Astrophysics Data System" />
  <meta name="application-name" content="Astrophysics Data System" />
  <meta name="msapplication-TileColor" content="#ffc40d" />

  <!-- Google Site Verification -->
  <meta name="google-site-verification" content="XxQuw38lagr8-TgtCyhAMP_6ELS9dy35fgrqo9dxw3o" />

  <!-- Google Tag Manager -->
  <script>
    (function(w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
      const f = d.getElementsByTagName(s)[0],
        j = d.createElement(s);
      j.async = true;
      j.src = `https://www.googletagmanager.com/gtm.js?id=${i}`;
      f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-NT2453N');
  </script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      loader: { load: ['[tex]/ams'] },
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        packages: { '[+]': ['ams'] },
        tags: 'ams',
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <!-- CAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js?render=6LcpTuUnAAAAAD6YCBdr_2-0b1AH8N6nXkYEG5G5" async></script>

  <!-- Noscript Styling -->
  <noscript>
    <style>
      #app-container { display: none; }
      body {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #noscriptmsg {
        max-width: 450px;
        padding: 10px;
      }
    </style>
  </noscript>
</head>

<body>
<noscript>
  <div id="noscriptmsg">
    <p>Sorry, but the fully featured ADS requires JavaScript to be enabled.</p>
    <p>
      <a class="btn btn-primary" href="https://ui.adsabs.harvard.edu/core">
        Switch to Basic HTML
      </a>
    </p>
  </div>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NT2453N"
          height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<div id="app-container">
  <div id="body-template-container" role="main">
    <article class="loading-screen" style="display: none">
      <h1 id="loading-screen-title">
        <span class="logo__astrophysics">astrophysics</span>
        <span class="logo__data-system">data system</span>
      </h1>
      <section id="loading-screen-bar">
        <span class="sr-only">loading...</span>
      </section>
      <h3 id="basic-html-message">
        Loading ADS |
        <a href="https://ui.adsabs.harvard.edu/core">Click here to switch to Basic HTML</a>
        (for slow connections/low resources)
      </h3>
      <div class="hidden well-sm center-block" id="app-error-container" data-testid="app-error">
        <div class="alert alert-warning small">
          <span id="app-error-message"></span>
        </div>
      </div>
    </article>
  </div>
</div>

<div id="darkSwitch" class="darkmode-toggle" title="Toggle dark mode">🌓</div>

<!-- Structured Data -->
<script type="application/ld+json">
  {
    "@context": "http://schema.org",
    "@type": "WebSite",
    "name": "ADS",
    "url": "https://ui.adsabs.harvard.edu/",
    "alternateName": "Astrophysics Data System",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://ui.adsabs.harvard.edu/search/q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
</script>
</body>
</html>
